name: Update Website on Release

on:
  release:
    types: [published]

jobs:
  update-website:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update version in index.html
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          echo "Updating to version: $VERSION"

          # Replace any version pattern (vYY.MMDDHHMM)
          sed -i "s/v[0-9]\{2\}\.[0-9]\{2\}\.[0-9]\{2,5\}[0-9]\{0,4\}/$VERSION/g" web/index.html

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add web/index.html
          git commit -m "chore: 🔧 Update version badge for release $VERSION" || echo "No changes to commit"
          git push origin main
